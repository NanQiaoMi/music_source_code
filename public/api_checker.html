<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimimusic AI Core // 核心诊断终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #020203;
        --accent-purple: #a855f7;
        --accent-cyan: #22d3ee;
        --accent-emerald: #10b981;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
      }

      body {
        background-color: var(--bg-deep);
        background-image:
          radial-gradient(circle at 20% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
        color: #fff;
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        letter-spacing: -0.01em;
      }

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid var(--glass-border);
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .btn-glow {
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        overflow: hidden;
      }
      .btn-glow:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
      }
      .btn-glow::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transform: rotate(45deg);
        transition: 0.5s;
      }
      .btn-glow:hover::after {
        left: 100%;
      }

      .input-glow {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        transition: all 0.3s ease;
      }
      .input-glow:focus {
        border-color: var(--accent-purple);
        background: rgba(168, 85, 247, 0.05);
        outline: none;
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
      }

      @keyframes scanline {
        0% {
          transform: translateY(-100%);
        }
        100% {
          transform: translateY(100vh);
        }
      }
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.1), transparent);
        opacity: 0.5;
        pointer-events: none;
        animation: scanline 8s linear infinite;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      .badge-success {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: #34d399;
      }
      .badge-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <div class="scanline"></div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- Sidebar: Configuration -->
      <aside class="lg:col-span-4 space-y-6">
        <div class="flex items-center gap-4 mb-8">
          <div
            class="w-12 h-12 glass rounded-2xl flex items-center justify-center border-purple-500/30"
          >
            <svg
              class="w-6 h-6 text-purple-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              ></path>
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-extrabold uppercase tracking-tighter italic">
              Mimimusic <span class="text-purple-500">AI Core</span>
            </h1>
            <p class="text-[9px] mono text-white/40 uppercase tracking-[0.2em]">
              Diagnostic Terminal v5.0.2
            </p>
          </div>
        </div>

        <section class="glass rounded-[2rem] p-6 space-y-5 border-white/5">
          <h2
            class="text-[10px] font-bold text-white/40 uppercase tracking-[0.3em] flex items-center gap-2"
          >
            <span class="w-1 h-1 bg-purple-500 rounded-full"></span> 协议接入配置
          </h2>

          <div class="space-y-4">
            <div class="space-y-1.5">
              <label class="text-[9px] font-bold text-white/20 uppercase ml-1"
                >基准地址 (Base URL)</label
              >
              <input
                id="baseUrl"
                type="text"
                value="https://api.openai.com/v1"
                class="w-full input-glow rounded-xl px-4 py-3 text-xs mono text-white/80"
              />
            </div>

            <div class="space-y-1.5">
              <label class="text-[9px] font-bold text-white/20 uppercase ml-1"
                >访问令牌 (API Key)</label
              >
              <div class="relative">
                <input
                  id="apiKey"
                  type="password"
                  placeholder="sk-..."
                  class="w-full input-glow rounded-xl px-4 py-3 text-xs mono text-white/80"
                />
                <button
                  onclick="toggleVisibility()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-white/20 hover:text-white/40 transition-colors"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <div class="flex gap-2">
              <button
                onclick="quickSet('https://api.deepseek.com/v1')"
                class="flex-1 py-2 glass rounded-lg text-[9px] font-bold text-white/40 hover:text-white/80 transition-all"
              >
                DeepSeek
              </button>
              <button
                onclick="quickSet('https://api.openai.com/v1')"
                class="flex-1 py-2 glass rounded-lg text-[9px] font-bold text-white/40 hover:text-white/80 transition-all"
              >
                OpenAI
              </button>
              <button
                onclick="quickSet('https://generativelanguage.googleapis.com/v1beta/openai')"
                class="flex-1 py-2 glass rounded-lg text-[9px] font-bold text-white/40 hover:text-white/80 transition-all"
              >
                Gemini
              </button>
            </div>

            <button
              id="syncBtn"
              onclick="fetchModels()"
              class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl text-[10px] uppercase tracking-widest shadow-lg shadow-purple-900/20 transition-all flex items-center justify-center gap-2"
            >
              <span id="syncBtnText">同步神经元列表</span>
            </button>
          </div>
        </section>

        <section id="modelSection" class="glass rounded-[2rem] p-6 space-y-4 hidden border-white/5">
          <div class="flex items-center justify-between">
            <h2 class="text-[10px] font-bold text-white/40 uppercase tracking-[0.3em]">发现模型</h2>
            <input
              id="modelFilter"
              type="text"
              placeholder="过滤..."
              oninput="renderModels()"
              class="bg-white/5 border border-white/5 rounded-lg px-3 py-1 text-[10px] mono focus:outline-none focus:border-purple-500/50"
            />
          </div>

          <div
            id="modelList"
            class="flex flex-wrap gap-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"
          >
            <!-- Models -->
          </div>

          <div class="pt-4 border-t border-white/5 space-y-3">
            <button
              id="testBtn"
              onclick="runDiagnostics()"
              class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-4 rounded-xl text-[10px] uppercase tracking-widest transition-all"
            >
              执行全量性能自检
            </button>
            <p class="text-[8px] text-center text-white/20 uppercase tracking-widest">
              选中单元: <span id="selectCount" class="text-white/40">0</span>
            </p>
          </div>
        </section>
      </aside>

      <!-- Main Content: Diagnostics -->
      <main class="lg:col-span-8 flex flex-col gap-6">
        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="glass rounded-3xl p-6 border-white/5">
            <p class="text-[9px] font-bold text-white/20 uppercase mb-1">平均响应延迟</p>
            <div class="flex items-end gap-2">
              <span id="statLatency" class="text-2xl font-extrabold text-cyan-400">--</span>
              <span class="text-[10px] text-white/20 mb-1">ms</span>
            </div>
          </div>
          <div class="glass rounded-3xl p-6 border-white/5">
            <p class="text-[9px] font-bold text-white/20 uppercase mb-1">系统握手成功率</p>
            <div class="flex items-end gap-2">
              <span id="statSuccess" class="text-2xl font-extrabold text-emerald-400">--</span>
              <span class="text-[10px] text-white/20 mb-1">%</span>
            </div>
          </div>
          <div class="glass rounded-3xl p-6 border-white/5 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 opacity-10">
              <svg class="w-20 h-20 text-purple-500" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"
                />
              </svg>
            </div>
            <p class="text-[9px] font-bold text-white/20 uppercase mb-1">活跃神经元</p>
            <span id="statOnline" class="text-2xl font-extrabold text-purple-400">--</span>
          </div>
        </div>

        <!-- Log Terminal -->
        <section class="glass rounded-[2.5rem] flex-1 flex flex-col overflow-hidden border-white/5">
          <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
              <h2 class="text-[10px] font-bold uppercase tracking-[0.3em]">
                实时遥测控制台 (Live Telemetry)
              </h2>
            </div>
            <div class="flex gap-2">
              <button
                onclick="clearLogs()"
                class="text-[9px] text-white/30 hover:text-white/60 font-bold uppercase tracking-widest transition-all"
              >
                清除
              </button>
              <button
                id="applyBtn"
                onclick="applyToApp()"
                disabled
                class="text-[9px] px-3 py-1 bg-purple-500/20 text-purple-400 border border-purple-500/30 rounded-lg hover:bg-purple-500/40 transition-all disabled:opacity-20 uppercase font-bold tracking-tighter"
              >
                写入主程序配置
              </button>
            </div>
          </div>

          <div
            id="logArea"
            class="flex-1 p-6 space-y-2 overflow-y-auto mono text-[10px] custom-scrollbar bg-black/40"
          >
            <div class="text-white/10 italic">等待系统指令...</div>
          </div>

          <!-- Active Viewers -->
          <div id="workingSection" class="p-4 bg-white/5 border-t border-white/5 hidden">
            <div class="flex flex-wrap gap-2" id="workingBadges">
              <!-- Success Badges -->
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      let allModels = [];
      let selectedModels = new Set();
      let testResults = [];
      let isTesting = false;

      // On Load: Read existing config from app
      window.onload = () => {
        const store = JSON.parse(
          localStorage.getItem("mimi-ai-store") || '{"state":{"configs":[]}}'
        );
        const configs = store.state.configs || [];
        if (configs.length > 0) {
          const active = configs.find((c) => c.id === store.state.activeConfigId) || configs[0];
          document.getElementById("baseUrl").value = active.baseUrl || "https://api.openai.com/v1";
          document.getElementById("apiKey").value = active.apiKey || "";
          log(`[系统] 成功读取到应用配置: ${active.name}`, "success");
        }
      };

      function log(msg, type = "default") {
        const area = document.getElementById("logArea");
        if (area.innerText.includes("等待系统指令")) area.innerHTML = "";

        const div = document.createElement("div");
        const time = new Date().toLocaleTimeString("zh-CN", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });

        let color = "text-white/40";
        if (type === "success") color = "text-emerald-400 font-bold";
        if (type === "error") color = "text-red-400";
        if (type === "info") color = "text-cyan-400";
        if (type === "warn") color = "text-amber-400";

        div.className = `py-0.5 animate-in fade-in slide-in-from-left-1 duration-300`;
        div.innerHTML = `<span class="text-white/10 mr-3">[${time}]</span><span class="${color}">${msg}</span>`;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
      }

      function quickSet(url) {
        document.getElementById("baseUrl").value = url;
        log(`[配置] 已预设端点: ${url}`, "info");
      }

      async function fetchModels() {
        const baseUrl = document.getElementById("baseUrl").value.trim().replace(/\/$/, "");
        const apiKey = document.getElementById("apiKey").value.trim();
        const btn = document.getElementById("syncBtnText");

        if (!apiKey) return log("错误: 未检测到有效的 API Key。", "error");

        btn.innerText = "正在握手...";
        log(`[网络] 正在探测神经中枢 ${baseUrl}...`, "info");

        try {
          const url = baseUrl.includes("/v1") ? `${baseUrl}/models` : `${baseUrl}/v1/models`;
          const resp = await fetch(url, {
            headers: { Authorization: `Bearer ${apiKey}` },
          });

          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

          const data = await resp.json();
          allModels = (data.data || []).map((m) => m.id).sort();

          if (allModels.length === 0) throw new Error("神经元响应为空。");

          renderModels();
          document.getElementById("modelSection").classList.remove("hidden");
          log(`[成功] 已上线 ${allModels.length} 个神经元单元。`, "success");
        } catch (err) {
          log(`[失败] 握手失败: ${err.message}`, "error");
        } finally {
          btn.innerText = "同步神经元列表";
        }
      }

      function renderModels() {
        const list = document.getElementById("modelList");
        const filter = document.getElementById("modelFilter").value.toLowerCase();
        list.innerHTML = "";

        const filtered = allModels.filter((m) => m.toLowerCase().includes(filter));
        filtered.forEach((m) => {
          const div = document.createElement("div");
          const active = selectedModels.has(m);
          div.className = `px-3 py-1.5 rounded-xl border text-[10px] mono cursor-pointer transition-all ${active ? "bg-purple-500/20 border-purple-500 text-purple-400 shadow-[0_0_10px_rgba(168,85,247,0.2)]" : "bg-white/5 border-white/5 text-white/30 hover:bg-white/10"}`;
          div.innerText = m;
          div.onclick = () => {
            if (selectedModels.has(m)) selectedModels.delete(m);
            else selectedModels.add(m);
            renderModels();
            document.getElementById("selectCount").innerText = selectedModels.size;
          };
          list.appendChild(div);
        });
      }

      async function runDiagnostics() {
        if (isTesting) return;
        const targets =
          selectedModels.size > 0 ? Array.from(selectedModels) : allModels.slice(0, 5);
        if (targets.length === 0) return log("错误: 请先同步并选择要测试的单元。", "error");

        isTesting = true;
        testResults = [];
        document.getElementById("testBtn").innerText = "扫描中 (SCANNING)...";
        document.getElementById("testBtn").disabled = true;
        document.getElementById("workingSection").classList.remove("hidden");
        document.getElementById("workingBadges").innerHTML = "";

        const baseUrl = document.getElementById("baseUrl").value.trim().replace(/\/$/, "");
        const apiKey = document.getElementById("apiKey").value.trim();
        const url = baseUrl.includes("/v1")
          ? `${baseUrl}/chat/completions`
          : `${baseUrl}/v1/chat/completions`;

        log(`[指令] 启动全量扫描模式 (${targets.length} 单元)...`, "info");

        for (const model of targets) {
          log(`[探测] ${model} ...`);
          const start = performance.now();
          try {
            const resp = await fetch(url, {
              method: "POST",
              headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
              body: JSON.stringify({
                model,
                messages: [{ role: "user", content: "ping" }],
                max_tokens: 5,
              }),
            });
            const end = performance.now();
            const latency = Math.round(end - start);

            if (resp.ok) {
              log(`[通过] ${model} | ${latency}ms`, "success");
              testResults.push({ model, latency, status: "ok" });
              addBadge(model, latency);
            } else {
              throw new Error(`STATUS ${resp.status}`);
            }
          } catch (e) {
            log(`[失败] ${model} | ${e.message}`, "error");
            testResults.push({ model, latency: 0, status: "fail" });
          }
          updateStats();
        }

        isTesting = false;
        document.getElementById("testBtn").innerText = "执行全量性能自检";
        document.getElementById("testBtn").disabled = false;
        document.getElementById("applyBtn").disabled =
          testResults.filter((r) => r.status === "ok").length === 0;
        log(`[结束] 诊断序列执行完毕。`, "info");
      }

      function addBadge(model, latency) {
        const container = document.getElementById("workingBadges");
        const b = document.createElement("div");
        b.className =
          "px-2 py-1 badge-success rounded-lg text-[8px] mono flex items-center gap-2 animate-in zoom-in";
        b.innerHTML = `<span>${model}</span><span class="opacity-40">${latency}ms</span>`;
        container.appendChild(b);
      }

      function updateStats() {
        const ok = testResults.filter((r) => r.status === "ok");
        const total = testResults.length;
        const avg =
          ok.length > 0 ? Math.round(ok.reduce((a, b) => a + b.latency, 0) / ok.length) : 0;

        document.getElementById("statLatency").innerText = avg || "--";
        document.getElementById("statSuccess").innerText =
          total > 0 ? Math.round((ok.length / total) * 100) : "--";
        document.getElementById("statOnline").innerText = ok.length;
      }

      function applyToApp() {
        const okModels = testResults.filter((r) => r.status === "ok");
        if (okModels.length === 0) return;

        const bestModel = okModels.sort((a, b) => a.latency - b.latency)[0].model;
        const baseUrl = document.getElementById("baseUrl").value.trim();
        const apiKey = document.getElementById("apiKey").value.trim();

        const store = JSON.parse(
          localStorage.getItem("mimi-ai-store") || '{"state":{"configs":[],"activeConfigId":null}}'
        );

        // Check if config exists
        let config = store.state.configs.find((c) => c.baseUrl === baseUrl);
        if (config) {
          config.apiKey = apiKey;
          config.model = bestModel;
          config.status = "online";
          config.lastTested = Date.now();
        } else {
          const id = Math.random().toString(36).substring(2, 11);
          store.state.configs.push({
            id,
            name: `自检导入-${bestModel}`,
            baseUrl,
            apiKey,
            model: bestModel,
            status: "online",
            lastTested: Date.now(),
          });
          store.state.activeConfigId = id;
        }

        localStorage.setItem("mimi-ai-store", JSON.stringify(store));
        log(`[同步] 已将 ${bestModel} 设为应用默认模型！`, "success");
        alert("配置已成功写入播放器！请刷新播放器页面。");
      }

      function clearLogs() {
        document.getElementById("logArea").innerHTML =
          '<div class="text-white/10 italic">控制台已重置。</div>';
        document.getElementById("workingBadges").innerHTML = "";
        testResults = [];
        updateStats();
      }

      function toggleVisibility() {
        const p = document.getElementById("apiKey");
        p.type = p.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
