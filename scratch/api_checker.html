<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimimusic AI 深度诊断工具 v3.2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top left, #1e1b4b 0%, #020617 100%); color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(32px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #a855f7; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-6xl flex flex-col lg:flex-row gap-6">
        
        <div class="flex-1 glass-panel p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <header class="flex items-center gap-5 mb-8">
                <div class="w-12 h-12 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg"><svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
                <div><h1 class="text-xl font-extrabold tracking-tight">AI 核心性能诊断</h1><p class="text-slate-400 font-medium text-xs">终端稳定版 v3.2.2</p></div>
            </header>

            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 text-indigo-300">接口基准地址 (Base URL)</label><input id="baseUrl" type="text" value="https://api.mnapi.com/v1" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white text-xs font-mono" /></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 text-indigo-300">访问密钥 (API Key)</label><input id="apiKey" type="password" placeholder="请输入 sk-..." class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white text-xs font-mono" /></div>
                </div>

                <div class="space-y-4 p-5 bg-white/5 rounded-2xl border border-white/5">
                    <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 text-indigo-300">测试指令 (Custom Prompt)</label><textarea id="customPrompt" rows="2" class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-white text-xs" placeholder="输入测试问题，默认发送 'hi'"></textarea></div>
                    <div class="flex gap-2">
                        <input id="manualModel" type="text" placeholder="手动添加模型名称 (例如: gpt-4o)" class="flex-1 bg-black/20 border border-white/10 rounded-xl px-4 py-2 text-[10px] text-white font-mono" />
                        <button onclick="addManualModel()" class="px-4 bg-white/10 hover:bg-white/20 text-white text-[10px] font-bold rounded-xl border border-white/10 transition-all">加入候检</button>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button id="refreshBtn" onclick="fetchModelList()" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl border border-white/10 transition-all text-sm flex items-center justify-center gap-2">
                        <span id="refreshBtnText">1. 刷新模型列表</span>
                    </button>
                    <button id="batchBtn" onclick="startBatchTest()" class="flex-[1.5] bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all text-sm hidden">
                        2. 开始批量测试
                    </button>
                </div>

                <div id="modelContainer" class="hidden space-y-4">
                    <div class="p-5 bg-slate-900/40 rounded-2xl border border-white/5">
                        <div class="flex items-center justify-between mb-3 px-1"><h3 class="text-[10px] font-bold text-slate-400 uppercase">模型库 (点击切换多选，不选则测试全部)</h3><span id="modelCount" class="text-[10px] text-slate-500 italic">0 个模型</span></div>
                        <div id="modelList" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto pr-2"></div>
                    </div>
                    <div id="progressArea" class="hidden p-4 bg-purple-500/10 rounded-xl border border-purple-500/20">
                        <div class="flex justify-between text-[10px] mb-2"><span id="progressText">正在准备测试...</span><span id="progressPercent">0%</span></div>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden"><div id="progressBar" class="bg-purple-500 h-full w-0 transition-all duration-300"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-96 glass-panel rounded-[2.5rem] flex flex-col overflow-hidden border-emerald-500/20">
            <div class="p-6 bg-emerald-500/10 border-b border-emerald-500/20"><h2 class="text-sm font-bold text-emerald-400 flex items-center gap-2 uppercase tracking-widest"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 实时诊断报告</h2></div>
            <div id="successList" class="flex-1 p-4 space-y-3 overflow-y-auto text-xs font-mono"><div class="text-slate-500 italic text-center py-12">请先点击左侧“刷新列表”</div></div>
            <div class="p-4 bg-black/20 border-t border-white/5"><button id="saveBtn" onclick="exportResults()" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-30 text-white font-bold py-3 rounded-xl transition-all text-xs">导出报告 (.txt)</button></div>
        </div>
    </div>

    <script>
        let allModels = [];
        let workingModels = [];
        let selectedForTest = new Set();
        let isTesting = false;

        async function fetchModelList() {
            const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, "");
            const apiKey = document.getElementById('apiKey').value.trim();
            const btn = document.getElementById('refreshBtn');
            const btnText = document.getElementById('refreshBtnText');
            
            if (!apiKey) return alert("请先输入 API Key");
            
            btn.disabled = true;
            btnText.innerHTML = '<div class="loader"></div>';
            document.getElementById('successList').innerHTML = '<div class="text-slate-400 italic text-center py-12">正在获取模型列表...</div>';

            try {
                const fullUrl = baseUrl.endsWith("/v1") ? `${baseUrl}/models` : `${baseUrl}/v1/models`;
                const response = await fetch(fullUrl, { 
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`HTTP 错误 ${response.status}`);

                const data = await response.json();
                let list = Array.isArray(data) ? data : (data.data || []);
                allModels = list.map(m => typeof m === 'string' ? m : (m.id || m.name)).filter(Boolean).sort();
                
                if (allModels.length === 0) throw new Error("获取到的模型列表为空");

                selectedForTest.clear();
                renderList();
                document.getElementById('modelContainer').classList.remove('hidden');
                document.getElementById('batchBtn').classList.remove('hidden');
                document.getElementById('successList').innerHTML = '<div class="text-slate-500 italic text-center py-12">列表已就绪，请选择模型并开始测试</div>';
            } catch (err) {
                alert("获取列表失败: " + err.message);
                document.getElementById('successList').innerHTML = `<div class="text-red-400 p-4 text-center">获取失败<br/>${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btnText.innerText = '1. 刷新模型列表';
            }
        }

        function renderList() {
            const listEl = document.getElementById('modelList');
            listEl.innerHTML = '';
            document.getElementById('modelCount').innerText = `${allModels.length} 个模型`;
            allModels.forEach(m => {
                const span = document.createElement('div');
                span.id = `m-${m.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const isSelected = selectedForTest.has(m);
                span.className = `px-2 py-1 border rounded-lg text-[10px] cursor-pointer transition-all ${isSelected ? 'bg-purple-500/40 border-purple-500/60 text-white' : 'bg-white/5 border-white/10 text-slate-400'}`;
                span.innerText = m;
                span.onclick = () => toggleModelSelection(m, span);
                listEl.appendChild(span);
            });
            updateBatchBtn();
        }

        function toggleModelSelection(model, el) {
            if (isTesting) return;
            if (selectedForTest.has(model)) {
                selectedForTest.delete(model);
                el.className = "px-2 py-1 bg-white/5 border border-white/10 rounded-lg text-[10px] text-slate-400 cursor-pointer hover:bg-white/10 transition-all";
            } else {
                selectedForTest.add(model);
                el.className = "px-2 py-1 bg-purple-500/40 border border-purple-500/60 rounded-lg text-[10px] text-white cursor-pointer transition-all";
            }
            updateBatchBtn();
        }

        function updateBatchBtn() {
            const btn = document.getElementById('batchBtn');
            btn.innerText = selectedForTest.size > 0 ? `2. 测试选中 (${selectedForTest.size})` : "2. 测试全部列表";
        }

        function addManualModel() {
            const m = document.getElementById('manualModel').value.trim();
            if (!m) return;
            if (allModels.includes(m)) return alert("该模型已在列表中");
            allModels.unshift(m);
            renderList();
            const el = document.getElementById(`m-${m.replace(/[^a-zA-Z0-9]/g, '_')}`);
            if (el) toggleModelSelection(m, el);
            document.getElementById('manualModel').value = '';
            document.getElementById('modelContainer').classList.remove('hidden');
            document.getElementById('batchBtn').classList.remove('hidden');
        }

        async function startBatchTest() {
            if (isTesting) return;
            const modelsToTest = selectedForTest.size > 0 ? Array.from(selectedForTest) : allModels;
            
            if (modelsToTest.length === 0) {
                alert("请先获取模型列表或手动添加模型！");
                return;
            }

            isTesting = true;
            workingModels = [];
            const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, "");
            const apiKey = document.getElementById('apiKey').value.trim();
            const progressArea = document.getElementById('progressArea');
            const successList = document.getElementById('successList');
            
            progressArea.classList.remove('hidden');
            successList.innerHTML = '';

            for (let i = 0; i < modelsToTest.length; i++) {
                const model = modelsToTest[i];
                const pct = Math.round(((i + 1) / modelsToTest.length) * 100);
                
                document.getElementById('progressBar').style.width = `${pct}%`;
                document.getElementById('progressPercent').innerText = `${pct}%`;
                document.getElementById('progressText').innerText = `正在测试: ${model}`;
                
                const modelEl = document.getElementById(`m-${model.replace(/[^a-zA-Z0-9]/g, '_')}`);
                if (modelEl) modelEl.className = "px-2 py-1 bg-purple-500 border border-purple-400 rounded-lg text-[10px] text-white animate-pulse";

                const startTime = performance.now();
                const result = await testSingleModel(baseUrl, apiKey, model);
                const endTime = performance.now();
                const latency = Math.round(endTime - startTime);

                if (result.success) {
                    workingModels.push({ model, latency, tokens: result.tokens });
                    if (modelEl) modelEl.className = "px-2 py-1 bg-emerald-500 border border-emerald-400 rounded-lg text-[10px] text-white shadow-[0_0_10px_rgba(16,185,129,0.3)]";
                    const item = document.createElement('div');
                    item.className = "p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl animate-in slide-in-from-right-4 duration-300";
                    item.innerHTML = `<div class="flex justify-between font-bold text-emerald-400 text-[10px]"><span>${model}</span><span class="bg-emerald-500 text-white px-1.5 py-0.5 rounded text-[8px]">通过</span></div><div class="flex justify-between text-[9px] opacity-60 mt-1"><span>延迟: ${latency}ms</span><span>消耗: ${result.tokens} Token</span></div>`;
                    successList.appendChild(item);
                    document.getElementById('saveBtn').disabled = false;
                } else {
                    if (modelEl) modelEl.className = "px-2 py-1 bg-red-500/10 border border-red-500/20 rounded-lg text-[10px] text-red-400 opacity-40";
                    const item = document.createElement('div');
                    item.className = "p-2 bg-red-500/5 border border-red-500/10 rounded-lg text-red-400/50 text-[9px] flex justify-between";
                    item.innerHTML = `<span>${model}</span> <span>失败</span>`;
                    successList.appendChild(item);
                }
            }
            isTesting = false;
            document.getElementById('progressText').innerText = `测试完成 (共通过 ${workingModels.length} 个)`;
            document.getElementById('progressBar').className = "bg-emerald-500 h-full w-full transition-all duration-300";
        }

        async function testSingleModel(baseUrl, apiKey, model) {
            const fullUrl = baseUrl.endsWith("/v1") ? `${baseUrl}/chat/completions` : `${baseUrl}/v1/chat/completions`;
            const prompt = document.getElementById('customPrompt').value.trim() || "hi";
            try {
                const response = await fetch(fullUrl, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, messages: [{ role: "user", content: prompt }], max_tokens: 50 })
                });
                if (!response.ok) return { success: false };
                const data = await response.json();
                return { success: true, tokens: data.usage?.total_tokens || 0 };
            } catch (err) { return { success: false }; }
        }

        function exportResults() {
            const content = `Mimimusic AI 诊断报告\n时间: ${new Date().toLocaleString()}\n--------------------------\n` + workingModels.map(m => `模型: ${m.model} | 延迟: ${m.latency}ms | 消耗: ${m.tokens} Token`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `mimimusic_report.txt`; a.click();
        }
    </script>
</body>
</html>
